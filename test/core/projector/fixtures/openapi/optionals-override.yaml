openapi: 3.1.0

info:
  title: Online Shop API
  version: 1.0.0

paths:
  /shipments:
    post:
      operationId: createShipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - trackingNumber
              properties:
                trackingNumber:
                  type: string
                  maxLength: 40
                deliveryInstructions:
                  type: string
                  maxLength: 40
      responses:
        '201':
          description: Created shipment
