data-sketch: 1.0.0-draft.3

info:
  name: online-shop

claims:
  customer:
    name: customers
    reason: |-
      Customer profile information is needed when customers are created and
      later looked up for ordering and support context.
    traces:
      operations:
        - createCustomer
        - getCustomer
    details:
      - name
      - email
      - phoneNumber
      - address.city
      - address.postalCode
    aliases:
      name:
        - customer name
      email:
        - email address
      phoneNumber:
        - phone number
      address.city:
        - address city
      address.postalCode:
        - postal code

  product:
    name: products
    reason: |-
      Product information is needed so users can browse products and select
      products for orders.
    traces:
      operations:
        - listProducts
    details:
      - name
      - price
      - inventoryStatus
      - discontinued
    aliases:
      name:
        - product name
      price:
        - selling price
      inventoryStatus:
        - inventory status
      discontinued:
        - discontinued flag

  order:
    name: orders
    tentative: true
    reason: |-
      Order state is needed after checkout so the service can create an order
      and return its detail.
    traces:
      operations:
        - createOrder
        - getOrderDetail
    details:
      - status
      - orderedAt
      - customer
      - items[].quantity
      - items[].unitPrice
      - items[].product
    aliases:
      status:
        - order status
      orderedAt:
        - ordered time
      customer:
        - order customer
      items[].quantity:
        - item quantity
      items[].unitPrice:
        - item unit price
      items[].product:
        - item product
    relations:
      customer: customer
      items[].product: product
