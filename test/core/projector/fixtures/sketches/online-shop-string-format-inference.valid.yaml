data-sketch: 1.0.0-draft.3

info:
  name: online-shop

sources:
  openapi: ../openapi/string-format-inference.yaml

claims:
  event:
    name: events
    reason: |-
      Event timing is needed after creation so the service can confirm when
      the event occurred and is scheduled.
    traces:
      operations:
        - createEvent
    details:
      - occurredAt
      - scheduledDate
      - alarmTime
      - occurrences[]
      - recordedAt

  eventConflict:
    name: event_conflicts
    reason: |-
      Conflicting event timing formats are needed to verify that mismatched
      OpenAPI string formats fall back to the default string type.
    traces:
      operations:
        - createEventConflict
    details:
      - occurredAt
