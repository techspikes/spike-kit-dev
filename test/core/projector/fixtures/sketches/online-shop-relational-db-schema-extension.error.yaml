data-sketch: 1.0.0-draft.3

info:
  name: online-shop

claims:
  customer:
    name: customers
    reason: |-
      Customer profile information is needed when customers are created and
      later looked up for ordering and support context.
    traces:
      operations:
        - createCustomer
    details:
      - name
      - email
      - phoneNumber
      - loyaltyFlag
    x-relational-db-schema:
      types:
        doesNotExist:
          type: VARCHAR
          length: 10
        phoneNumber:
          type: CHAR
        email:
          type: DECIMAL
          precision: 5
        name:
          type: NUMERIC
        loyaltyFlag:
          type: BIT
        id: not-an-object
      constraints:
        unknownConstraintMember: true
        unique: not-an-array
        check:
          - name: ""
            column: phoneNumber
            enum:
              - active
          - name: ck_bad_column
            column: doesNotExist
            enum:
              - active
          - name: ck_empty_enum
            column: phoneNumber
            enum: []
          - name: ck_bad_enum_value
            column: phoneNumber
            enum:
              - ""
      indexes:
        - name: ix_bad_column
          columns:
            - doesNotExist
        - name: ""
          columns:
            - name
      names:
        unknownNamesMember: true
        tables:
          doesNotExist: newName
          customer: products
        columns:
          doesNotExist:
            name: foo
          customer: not-an-object

  order:
    name: orders
    tentative: true
    reason: |-
      Order state is needed after checkout so the service can create an order
      and return its detail.
    traces:
      operations:
        - createOrder
    details:
      - status
    relations:
      customer: customer
    x-relational-db-schema:
      names:
        columns:
          order:
            doesNotExist: foo
            status: ""
            customer: id
      keys:
        unknownKeyMember: true
        foreign:
          - name: fk_missing_column
            references:
              table: customer
              column: id
          - name: fk_empty_column
            column: ""
            references:
              table: customer
              column: id
          - name: fk_bad_references_shape
            column: status
            references:
              notATable: true
          - name: fk_non_id_ref_column
            column: status
            references:
              table: customer
              column: name
          - name: fk_unknown_source_column
            column: doesNotExist
            references:
              table: customer
              column: id
          - name: fk_unknown_ref_table
            column: status
            references:
              table: doesNotExist
              column: id
          - not-an-object
          - name: fk_dup1
            column: customer
            references:
              table: customer
              column: id
          - name: fk_dup2
            column: customer
            references:
              table: customer
              column: id
          - name: fk_missing_references
            column: status
          - name: ""
            column: status
            references:
              table: customer
              column: id
          - name: fk_empty_ref_column
            column: status
            references:
              table: customer
              column: ""

  product:
    name: products
    reason: |-
      Product information is needed so users can browse products and select
      products for orders.
    traces:
      operations:
        - listProducts
    details:
      - name
    x-relational-db-schema:
      keys:
        foreign: not-an-array

  shipment:
    name: shipments
    reason: |-
      Shipment records are needed for the fulfillment workflow.
    traces:
      operations:
        - listShipments
    details:
      - trackingNumber
    x-relational-db-schema: not-an-object

  payment:
    name: payments
    reason: |-
      Payment records are needed for checkout reconciliation.
    traces:
      operations:
        - listPayments
    details:
      - transactionId
    x-relational-db-schema:
      unsupportedTopMember: true
      types: not-an-object
      keys: not-an-object
      constraints: not-an-object
      indexes: not-an-array
      names: not-an-object

  returnRequest:
    name: return_requests
    reason: |-
      Return request records are needed for customer returns.
    traces:
      operations:
        - listReturnRequests
    details:
      - requestNumber
    x-relational-db-schema:
      keys:
        unknownMember: true

  coupon:
    name: coupons
    reason: |-
      Coupon records are needed for promotions.
    traces:
      operations:
        - listCoupons
    details:
      - code
    x-relational-db-schema:
      constraints:
        check: not-an-array
        unique:
          - name: ""
            columns:
              - code
          - columns: []
          - columns:
              - doesNotExist
      names:
        tables: not-an-object
        columns: not-an-object

  warehouse:
    name: warehouses
    reason: |-
      Warehouse records are needed for fulfillment locations.
    traces:
      operations:
        - listWarehouses
    details:
      - locationCode
    x-relational-db-schema:
      names:
        tables:
          warehouse: ""
