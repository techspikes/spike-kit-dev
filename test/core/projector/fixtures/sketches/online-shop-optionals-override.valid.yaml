data-sketch: 1.0.0-draft.3

info:
  name: online-shop

sources:
  openapi: ../openapi/optionals-override.yaml

claims:
  shipment:
    name: shipments
    reason: |-
      Shipment information is needed after creation so the service can confirm
      the shipment was registered.
    traces:
      operations:
        - createShipment
    details:
      - trackingNumber
      - deliveryInstructions
    optionals:
      trackingNumber: true
      deliveryInstructions: false
