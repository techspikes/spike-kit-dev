data-sketch: 1.0.0-draft.2

info:
  name: online-shop

claims:
  shipment:
    name: shipments
    reason: |-
      Shipment records are needed for the fulfillment workflow.
    traces:
      operations:
        - createShipment
    details:
      - trackingNumber
      - carrier
      - status
    x-relational-db-schema:
      constraints:
        unique:
          - columns:
              - trackingNumber
          - columns:
              - carrier
              - status
        check:
          - column: status
            enum:
              - pending
              - shipped
          - name: ck_shipments_explicit_carrier
            column: carrier
            enum:
              - ground
              - express
