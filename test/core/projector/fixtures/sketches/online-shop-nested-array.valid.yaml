data-sketch: 1.0.0-draft.3

info:
  name: online-shop

claims:
  order:
    name: orders
    reason: |-
      Order state is needed after checkout so the service can create an order
      and return its detail.
    traces:
      operations:
        - createOrder
    details:
      - items[].stocks[].price
      - items[].stocks[].quantity
    aliases:
      items[].stocks[].price:
        - item stock lot price
      items[].stocks[].quantity:
        - item stock lot quantity
