data-sketch: 1.0.0-draft.1

info:
  name: online-shop

sources:
  openapi: ./openapi.yaml

stores:
  customer:
    name: customers
    reason: Persist customer information.
    trace:
      operations:
        - createCustomer
        - getCustomer

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      publicId:
        name: public_id
        type:
          name: char
          length: 26
        nullable: false
        format: ulid
        aliases:
          - customer number
          - customer code

      name:
        name: name
        type:
          name: varchar
          length: 100
        nullable: false
        aliases:
          - customer full name

    keys:
      primary:
        name: pk_customers
        fields:
          - id

      unique:
        - name: ux_customers_public_id
          fields:
            - publicId

  order:
    name: orders
    reason: Order operations need to create, read, list, and cancel orders.
    trace:
      operations:
        - createOrder
        - getOrderDetail
        - cancelOrder
        - listOrders

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      publicId:
        name: public_id
        type:
          name: char
          length: 26
        nullable: false
        format: ulid
        aliases:
          - order number

      customerId:
        name: customer_id
        type:
          name: integer
        nullable: false
        aliases:
          - buyer customer

      status:
        name: status
        type:
          name: varchar
          length: 20
        nullable: false
        aliases:
          - order state
          - fulfillment status
        enum:
          - created
          - cancelled

      createdAt:
        name: created_at
        type:
          name: timestamp
        nullable: false

      updatedAt:
        name: updated_at
        type:
          name: timestamp
        nullable: false

    keys:
      primary:
        name: pk_orders
        fields:
          - id

      unique:
        - name: ux_orders_public_id
          fields:
            - publicId

      foreign:
        - name: fk_orders_customer
          fields:
            - customerId
          references:
            store: customer
            fields:
              - id
          onDelete: restrict
          onUpdate: restrict

    indexes:
      - name: ix_orders_status
        fields:
          - status
        reason: Used to search orders by status.

      - name: ix_orders_customer_created_at
        fields:
          - customerId
          - field: createdAt
            order: desc
        reason: Used to list orders for a customer.

  cart:
    name: carts
    reason: Persist shopping carts before checkout.
    trace:
      operations:
        - getCart

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      customerId:
        name: customer_id
        type:
          name: integer
        nullable: false

      status:
        name: status
        type:
          name: varchar
          length: 20
        nullable: false
        default: active

      expiresAt:
        name: expires_at
        type:
          name: timestamp
        nullable: true
        default: null

    keys:
      foreign:
        - name: fk_carts_customer
          fields:
            - customerId
          references:
            store: customer
            fields:
              - id

  cartItem:
    name: cart_items
    reason: Persist products added to shopping carts.
    trace:
      operations:
        - getCart

    fields:
      cartId:
        name: cart_id
        type:
          name: integer
        nullable: false

      productId:
        name: product_id
        type:
          name: integer
        nullable: false

      quantity:
        name: quantity
        type:
          name: integer
        nullable: false
        default: 1

    keys:
      primary:
        name: pk_cart_items
        fields:
          - cartId
          - productId
