data-sketch: 1.0.0-draft.1

info:
  name: online-shop

sources:
  openapi: ./openapi.yaml

stores:
  customer:
    name: customers
    traces:
      operations:
        - createCustomer
        - getCustomer
    reason: Customer profiles need to be looked up when handling orders and support requests.

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      publicId:
        name: public_id
        aliases:
          - customer number
          - customer code
        reason: Customers need a stable public identifier that doesn't reveal the internal sequential id.
        type:
          name: char
          length: 26
        format: ulid
        nullable: false

      name:
        name: name
        aliases:
          - customer full name
        type:
          name: varchar
          length: 100
        nullable: false

    keys:
      primary:
        name: pk_customers
        fields:
          - id

      unique:
        - name: ux_customers_public_id
          fields:
            - publicId

  order:
    name: orders
    traces:
      operations:
        - createOrder
        - getOrderDetail
        - cancelOrder
        - listOrders
    reason: Customers need to view their order history and cancel orders that haven't shipped yet.

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      publicId:
        name: public_id
        aliases:
          - order number
        type:
          name: char
          length: 26
        format: ulid
        nullable: false

      customerId:
        name: customer_id
        aliases:
          - buyer customer
        type:
          name: integer
        nullable: false

      status:
        name: status
        aliases:
          - order state
          - fulfillment status
        type:
          name: varchar
          length: 20
        nullable: false
        enum:
          - created
          - cancelled

      createdAt:
        name: created_at
        type:
          name: timestamp
        nullable: false

      updatedAt:
        name: updated_at
        type:
          name: timestamp
        nullable: false

    keys:
      primary:
        name: pk_orders
        fields:
          - id

      unique:
        - name: ux_orders_public_id
          fields:
            - publicId

      foreign:
        - name: fk_orders_customer
          fields:
            - customerId
          references:
            store: customer
            fields:
              - id
          onDelete: restrict
          onUpdate: restrict

    indexes:
      - name: ix_orders_status
        fields:
          - status
        reason: Used to search orders by status.

      - name: ix_orders_customer_created_at
        fields:
          - customerId
          - field: createdAt
            order: desc
        reason: Used to list orders for a customer.

  cart:
    name: carts
    traces:
      operations:
        - getCart
    reason: Customers need to view their cart contents before checkout.

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      customerId:
        name: customer_id
        type:
          name: integer
        nullable: false

      status:
        name: status
        type:
          name: varchar
          length: 20
        nullable: false
        default: active

      expiresAt:
        name: expires_at
        type:
          name: timestamp
        nullable: true
        default: null

    keys:
      foreign:
        - name: fk_carts_customer
          fields:
            - customerId
          references:
            store: customer
            fields:
              - id

  cartItem:
    name: cart_items
    traces:
      operations:
        - getCart
    reason: Customers need to see which products they've added to their cart.

    fields:
      cartId:
        name: cart_id
        type:
          name: integer
        nullable: false

      productId:
        name: product_id
        type:
          name: integer
        nullable: false

      quantity:
        name: quantity
        type:
          name: integer
        nullable: false
        default: 1

    keys:
      primary:
        name: pk_cart_items
        fields:
          - cartId
          - productId
