data-sketch: 1.0.0-draft.2

info:
  name: online-shop

claims:
  order:
    name: orders
    reason: |-
      Order state is needed after checkout so the service can create an order
      and return its detail.
    traces:
      operations:
        - createOrder
    details:
      - items[].stocks.price
      - items[].stocks.quantity
    aliases:
      items[].stocks.price:
        - item stock price
      items[].stocks.quantity:
        - item stock quantity
