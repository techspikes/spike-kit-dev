data-sketch: 1.0.0-draft.2

info:
  name: online-shop

claims:
  customer:
    name: customers
    reason: |-
      Customer profile information is needed when customers are created and
      later looked up for ordering and support context.
    traces:
      operations:
        - createCustomer
        - getCustomer
    details:
      name:
        aliases:
          - customer name
      email:
        aliases:
          - email address
      phoneNumber:
        aliases:
          - phone number
        required: false
      address.city:
        aliases:
          - address city
      address.postalCode:
        aliases:
          - postal code

  product:
    name: products
    reason: |-
      Product information is needed so users can browse products and select
      products for orders.
    traces:
      operations:
        - listProducts
    details:
      name:
        aliases:
          - product name
      price:
        aliases:
          - selling price
        type: number
      inventoryStatus:
        aliases:
          - inventory status
      discontinued:
        aliases:
          - discontinued flag
        type: boolean

  order:
    name: orders
    tentative: true
    reason: |-
      Order state is needed after checkout so the service can create an order
      and return its detail.
    traces:
      operations:
        - createOrder
        - getOrderDetail
    details:
      status:
        aliases:
          - order status
      orderedAt:
        aliases:
          - ordered time
      customer:
        aliases:
          - order customer
      items[].quantity:
        aliases:
          - item quantity
        type: number
      items[].unitPrice:
        aliases:
          - item unit price
        type: number
      items[].product:
        aliases:
          - item product
    relations:
      customer: customer
      items[].product: product
