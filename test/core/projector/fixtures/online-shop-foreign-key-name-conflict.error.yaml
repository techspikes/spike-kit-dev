data-sketch: 1.0.0-draft.2

info:
  name: online-shop

claims:
  customer:
    name: customers
    reason: |-
      Customer profile information is needed when customers are created and
      later looked up for ordering and support context.
    traces:
      operations:
        - createCustomer
    details:
      - name

  product:
    name: products
    reason: |-
      Product information is needed so users can browse products and select
      products for orders.
    traces:
      operations:
        - listProducts
    details:
      - name

  order:
    name: orders
    reason: |-
      Order state is needed after checkout so the service can create an order
      and return its detail.
    traces:
      operations:
        - createOrder
    details:
      - customer
      - product
    relations:
      customer: customer
    x-relational-db-schema:
      keys:
        foreign:
          - name: fk_orders_customer
            column: product
            references:
              table: product
              column: id
          - column: product
            references:
              table: product
              column: id
          - name: fk_orders_product
            column: customer
            references:
              table: customer
              column: id
