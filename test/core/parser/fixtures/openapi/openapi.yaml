openapi: 3.1.0

info:
  title: Online Shop API
  version: 1.0.0

paths:
  /customers:
    post:
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
                phoneNumber:
                  type: string
                address:
                  type: object
                  properties:
                    city:
                      type: string
                    postalCode:
                      type: string
      responses:
        '201':
          description: Created customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  customerId:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  phoneNumber:
                    type: string
                  address:
                    type: object
                    properties:
                      city:
                        type: string
                      postalCode:
                        type: string

  /customers/{customerId}:
    get:
      operationId: getCustomer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  customerId:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  phoneNumber:
                    type: string
                  address:
                    type: object
                    properties:
                      city:
                        type: string
                      postalCode:
                        type: string

  /products:
    get:
      operationId: listProducts
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: object
                required:
                  - products
                properties:
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                        name:
                          type: string
                        price:
                          type: number
                        inventoryStatus:
                          type: string

  /orders:
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customerId
                - items
              properties:
                customerId:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: string
                      quantity:
                        type: number
      responses:
        '201':
          description: Created order
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                  customerId:
                    type: string
                  status:
                    type: string
                  orderedAt:
                    type: string
                    format: date-time
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                        quantity:
                          type: number
                        unitPrice:
                          type: number

  /orders/{orderId}:
    get:
      operationId: getOrderDetail
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                  customerId:
                    type: string
                  status:
                    type: string
                  orderedAt:
                    type: string
                    format: date-time
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                        quantity:
                          type: number
                        unitPrice:
                          type: number
