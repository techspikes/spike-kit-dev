data-sketch: 1.0.0-draft.1

info:
  name: online-shop

sources:
  openapi: ./openapi.yaml

stores:
  customer:
    name: customers
    traces:
      operations:
        - createCustomer
        - getCustomer
    reason: Customer profiles need to be looked up when handling orders and support requests.

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      publicId:
        name: id
        type:
          name: char
          length: 26
        nullable: false

  order:
    name: customers
    traces:
      operations:
        - createOrder
        - listOrders
    reason: Customers need to view their order history and cancel orders that haven't shipped yet.

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false
