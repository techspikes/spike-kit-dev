data-sketch: 1.0.0-draft.1

info:
  name: online-shop

sources:
  openapi: ./openapi.yaml

stores:
  customer:
    name: customers
    traces:
      operations:
        - createCustomer
        - getCustomer
    reason: Customer profiles need to be looked up when handling orders and support requests.
    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

  order:
    name: orders
    traces:
      operations:
        - createOrder
        - listOrders
    reason: Customers need to view their order history and cancel orders that haven't shipped yet.
    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false
      customerId:
        name: customer_id
        type:
          name: integer
        nullable: false
      createdAt:
        name: created_at
        type:
          name: timestamp
        nullable: false
    keys:
      primary:
        name: pk_orders
        fields:
          - missingPrimaryId
      unique:
        - name: ux_orders_public_id
          fields:
            - missingPublicId
      foreign:
        - name: fk_orders_customer
          fields:
            - missingCustomerId
          references:
            store: customer
            fields:
              - id
    indexes:
      - name: ix_orders_status
        fields:
          - missingStatus
