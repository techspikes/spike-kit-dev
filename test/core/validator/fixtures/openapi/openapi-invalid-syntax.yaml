openapi: 3.0.3

info:
  title: Online Shop API
  version: 1.0.0

paths:
  /customers:
    post:
      operationId: createCustomer
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Customer created
      - invalid
