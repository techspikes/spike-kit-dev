data-sketch: 1.0.0-draft.1

info:
  name: online-shop

sources:
  openapi: ./openapi.yaml

stores:
  customer:
    name: customers
    reason: Persist customer information.
    trace:
      operations:
        - createCustomer
        - getCustomer

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      publicId:
        name: public_id
        type:
          name: char
          length: 26
        nullable: false

    keys:
      primary:
        name: pk_customers
        fields:
          - id

  order:
    name: orders
    reason: Order operations need to create, read, list, and cancel orders.
    trace:
      operations:
        - createOrder
        - listOrders

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      publicId:
        name: public_id
        type:
          name: char
          length: 26
        nullable: false

      customerId:
        name: customer_id
        type:
          name: integer
        nullable: false

      status:
        name: status
        type:
          name: varchar
          length: 20
        nullable: false

      createdAt:
        name: created_at
        type:
          name: timestamp
        nullable: false

    keys:
      primary:
        name: pk_orders
        fields:
          - id

      foreign:
        - name: fk_orders_customer
          fields:
            - customerId
          references:
            store: customer
            fields:
              - id

    indexes:
      - name: ix_orders_status
        fields:
          - status
      - name: ix_orders_created_at
        fields:
          - field: createdAt
            order: desc
