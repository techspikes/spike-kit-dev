data-sketch: 1.0.0-draft.0

info:
  name: online-shop

sources:
  openapi: ./openapi.yaml

stores:
  customer:
    name: customers
    reason: Persist customer information.
    trace:
      operations:
        - createCustomer
        - getCustomer

    fields:
      id:
        name: id
        type:
          name: bit
        nullable: false

      publicId:
        name: public_id
        type:
          name: char
          length: 26
        nullable: false

  order:
    name: orders
    reason: Order operations need to create, read, list, and cancel orders.
    trace:
      operations:
        - createOrder
        - listOrders
    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false
