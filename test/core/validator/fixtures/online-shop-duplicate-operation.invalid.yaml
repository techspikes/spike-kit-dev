data-sketch: 1.0.0-draft.2

info:
  name: online-shop

sources:
  openapi: ./openapi/duplicate-operation-id.yaml

claims:
  customer:
    name: customers
    reason: |-
      Customer profile information is needed when customers are created and
      later looked up for ordering and support context.
    traces:
      operations:
        - createCustomer
        - getCustomer
    details:
      - name
      - email
      - phoneNumber
      - address.city
      - address.postalCode
