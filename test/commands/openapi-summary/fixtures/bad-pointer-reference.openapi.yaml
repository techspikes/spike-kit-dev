openapi: 3.1.0

info:
  title: Online Shop API
  version: 1.0.0

paths:
  /customers:
    post:
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#components/schemas/customer'
      responses:
        '201':
          description: Created customer

components:
  schemas:
    customer:
      type: object
      properties:
        name:
          type: string
