data-sketch: 1.0.0-draft.1

info:
  name: online-shop

stores:
  cartItem:
    name: cart_items
    traces:
      operations:
        - getCart
    reason: Customers need to see which products they've added to their cart.

    fields:
      cartId:
        name: cart_id
        type:
          name: integer
        nullable: false

      productId:
        name: product_id
        type:
          name: integer
        nullable: false

      quantity:
        name: quantity
        type:
          name: integer
        nullable: false
        default: 1

    keys:
      primary:
        name: pk_cart_items
        fields:
          - cartId
          - productId
