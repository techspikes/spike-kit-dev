data-sketch: 1.0.0-draft.1

info:
  name: online-shop

sources:
  openapi: ./openapi.yaml

stores:
  customer:
    fields:
      id:
        type:
          name: integer
        nullable: false
        name: id
      publicId:
        aliases:
          - customer number
          - customer code
        reason: Customers need a stable public identifier that doesn't reveal the internal sequential id.
        type:
          length: 26
          name: char
        format: ulid
        nullable: false
        name: public_id
      name:
        aliases:
          - customer full name
        type:
          length: 100
          name: varchar
        nullable: false
        name: name
    traces:
      operations:
        - createCustomer
        - getCustomer
    reason: Customer profiles need to be looked up when handling orders and support requests.
    name: customers
    keys:
      primary:
        fields:
          - id
        name: pk_customers
      unique:
        - fields:
            - publicId
          name: ux_customers_public_id
  order:
    fields:
      id:
        type:
          name: integer
        nullable: false
        name: id
      publicId:
        aliases:
          - order number
        type:
          length: 26
          name: char
        format: ulid
        nullable: false
        name: public_id
      customerId:
        aliases:
          - buyer customer
        type:
          name: integer
        nullable: false
        name: customer_id
      status:
        aliases:
          - order state
          - fulfillment status
        type:
          length: 20
          name: varchar
        enum:
          - created
          - cancelled
        nullable: false
        name: status
      createdAt:
        type:
          name: timestamp
        nullable: false
        name: created_at
      updatedAt:
        type:
          name: timestamp
        nullable: false
        name: updated_at
    traces:
      operations:
        - createOrder
        - getOrderDetail
        - cancelOrder
        - listOrders
    reason: Customers need to view their order history and cancel orders that haven't shipped yet.
    name: orders
    keys:
      primary:
        fields:
          - id
        name: pk_orders
      unique:
        - fields:
            - publicId
          name: ux_orders_public_id
      foreign:
        - fields:
            - customerId
          references:
            fields:
              - id
            store: customer
          onDelete: restrict
          onUpdate: restrict
          name: fk_orders_customer
    indexes:
      - fields:
          - status
        reason: Used to search orders by status.
        name: ix_orders_status
      - fields:
          - customerId
          - createdAt
        reason: Used to list orders for a customer.
        name: ix_orders_customer_created_at
