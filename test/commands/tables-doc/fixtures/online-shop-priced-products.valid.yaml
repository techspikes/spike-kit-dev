data-sketch: 1.0.0-draft.1

info:
  name: online-shop

stores:
  priceNote:
    name: price_notes
    traces:
      operations:
        - listProducts
    reason: Product managers keep pricing notes before publishing products.

    fields:
      note:
        name: note
        type:
          name: varchar
          length: 100
        nullable: false
        default: draft

  category:
    name: categories
    traces:
      operations:
        - listProducts
    reason: Customers need to browse the product catalog by category.

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      name:
        name: name
        type:
          name: varchar
          length: 100
        nullable: false

    keys:
      primary:
        name: pk_categories
        fields:
          - id

  product:
    name: products
    traces:
      operations:
        - listProducts
    reason: Product catalog needs prices for online checkout.

    fields:
      id:
        name: id
        type:
          name: integer
        nullable: false

      categoryId:
        name: category_id
        type:
          name: integer
        nullable: false

      price:
        name: price
        aliases:
          - checkout price
        type:
          name: decimal
          precision: 10
          scale: 2
        nullable: false
        default: 0

      taxRate:
        name: tax_rate
        aliases:
          - sales tax rate
        type:
          name: numeric
          precision: 5
        nullable: false
        default: 8

      status:
        name: status
        aliases:
          - product availability
        type:
          name: varchar
          length: 20
        nullable: false
        default: available

      featured:
        name: featured
        aliases:
          - promoted product
        type:
          name: boolean
        nullable: false
        default: true

      discontinued:
        name: discontinued
        aliases:
          - retired product
        type:
          name: boolean
        nullable: false
        default: false

      saleEndsAt:
        name: sale_ends_at
        aliases:
          - sale end date
        type:
          name: timestamp
        nullable: true
        default: null

    keys:
      primary:
        name: pk_products
        fields:
          - id

      foreign:
        - name: fk_products_category
          fields:
            - categoryId
          references:
            store: category
            fields:
              - id

    indexes:
      - name: ix_products_price
        fields:
          - price
