data-sketch: 1.0.0-draft.3
info:
  name: online-shop

claims:
  product:
    name: products
    reason: Product information is needed so users can select products for orders.
    traces:
      operations:
        - createProduct
    details:
      - sku
      - price
      - active
    x-relational-db-schema:
      types:
        price:
          type: DECIMAL
          precision: 10
          scale: 2
        active:
          type: BOOLEAN
      constraints:
        unique:
          - name: uq_products_sku
            columns:
              - sku
              - price
      indexes:
        - name: idx_products_sku
          columns:
            - sku
            - price
