data-sketch: 1.0.0-draft.2

info:
  name: online-shop

sources:
  openapi: ../openapi/online-shop.openapi.yaml

claims:
  customer:
    name: customers
    reason: Customer profile information is needed when orders are created.
    traces:
      operations:
        - createCustomer
    details:
      - name
      - phone

  order:
    name: orders
    tentative: true
    reason: |-
      Order state is needed after checkout so the service can create an order
      and return its detail.
    traces:
      operations:
        - createOrder
    details:
      - status
      - customer
      - items[].quantity
    aliases:
      status:
        - order status
      customer:
        - order customer
      items[].quantity:
        - item quantity
    relations:
      customer: customer
    x-relational-db-schema:
      constraints:
        unique:
          - name: uq_orders_status_customer
            columns:
              - status
              - customer
        check:
          - name: ck_orders_status
            column: status
            enum:
              - pending
              - shipped
              - delivered
      indexes:
        - name: idx_orders_status
          columns:
            - status
