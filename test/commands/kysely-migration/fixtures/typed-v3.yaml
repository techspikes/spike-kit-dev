data-sketch: 1.0.0-draft.2
info:
  name: typed

claims:
  product:
    name: products
    reason: Products are sold in the store.
    traces:
      operations:
        - createProduct
    details:
      - sku
      - price
      - active
    x-relational-db-schema:
      types:
        price:
          type: DECIMAL
          precision: 10
          scale: 4
        active:
          type: BOOLEAN
      constraints:
        unique:
          - name: uq_products_sku
            columns:
              - sku
      indexes:
        - name: idx_products_sku
          columns:
            - sku
