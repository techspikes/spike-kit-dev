data-sketch: 1.0.0-draft.2
info:
  name: simple

claims:
  author:
    name: authors
    reason: Authors write posts.
    traces:
      operations:
        - createAuthor
    details:
      - pen_name
      - bio
  post:
    name: posts
    reason: Posts are written by authors.
    traces:
      operations:
        - createPost
    details:
      - title
      - author
    relations:
      author: author
  tag:
    name: tags
    reason: Tags categorize posts.
    traces:
      operations:
        - createTag
    details:
      - label
      - post
    relations:
      post: post
    x-relational-db-schema:
      constraints:
        unique:
          - name: uq_tags_label
            columns:
              - label
